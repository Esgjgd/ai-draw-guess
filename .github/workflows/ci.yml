name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Ruff
        run: ruff check .

      - name: Pytest
        env:
          BAISHAN_API_KEY: "test"
        run: pytest -q

  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t ai-draw-guess:test .

      - name: Test Docker image
        run: |
          # Start the container
          docker run -d --name test-app -p 8000:8000 ai-draw-guess:test

          # Wait for the application to start (up to 30 seconds)
          for i in {1..30}; do
            if curl -f http://localhost:8000/api/health > /dev/null 2>&1; then
              echo "Application is ready!"
              break
            fi
            echo "Waiting for application to start... ($i/30)"
            sleep 1
          done

          # Check if the health endpoint returns the expected response
          response=$(curl -s http://localhost:8000/api/health)
          if [ "$response" != '{"status":"ok"}' ]; then
            echo "Health check failed. Expected '{\"status\":\"ok\"}', got '$response'"
            docker logs test-app
            exit 1
          fi

          echo "Health check passed!"

      - name: Clean up
        run: |
          docker stop test-app || true
          docker rm test-app || true
