name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Ruff
        run: ruff check .

      - name: Pytest
        env:
          BAISHAN_API_KEY: "test"
        run: pytest -q

  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ai-draw-guess:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image
        run: |
          # Start the container
          docker run -d --name test-app -p 8000:8000 ai-draw-guess:test

          # Wait for the application to start
          timeout 30 bash -c 'until curl -f http://localhost:8000/api/health; do sleep 1; done'

          # Check if the health endpoint returns the expected response
          response=$(curl -s http://localhost:8000/api/health)
          if [ "$response" != '{"status":"ok"}' ]; then
            echo "Health check failed. Expected '{\"status\":\"ok\"}', got '$response'"
            docker logs test-app
            exit 1
          fi

          echo "Health check passed!"

      - name: Clean up
        run: |
          docker stop test-app
          docker rm test-app
