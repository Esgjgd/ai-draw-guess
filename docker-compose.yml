version: '3.8'

services:
  ai-draw-guess:
    build: .
    ports:
      - "8000:8000"
    environment:
      - BAISHAN_API_KEY=${BAISHAN_API_KEY}
      - BAISHAN_MODEL=${BAISHAN_MODEL:-DeepSeek-R1-0528}
      - BAISHAN_BASE_URL=${BAISHAN_BASE_URL:-https://api.edgefn.net/v1}
    env_file:
      - .env
    volumes:
      - .:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s